name: myvideofeed

services:
  myvideofeed:
    container_name: myvideofeed
    build: .
    image: myvideofeed:cli
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    restart: unless-stopped

  # Optional: docker compose --profile mysql up. Set DB_DRIVER=mysql, DB_HOST=database in .env.
  database:
    container_name: database
    image: mariadb:11
    profiles: ["mysql"]
    env_file:
      - .env
    # Derive MARIADB_* bootstrap vars from DB_* so .env is the single source.
    environment:
      MARIADB_DATABASE: ${DB_NAME:-myvideofeed}
      MARIADB_USER: ${DB_USER:-myvideofeed}
      MARIADB_PASSWORD: ${DB_PASS:-change-me}
      MARIADB_ROOT_PASSWORD: ${DB_PASS:-change-me}
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
